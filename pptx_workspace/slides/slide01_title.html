<!DOCTYPE html>
<html>
<head>
<style>
html { background: #0F1117; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #0F1117; font-family: Arial, sans-serif;
  display: flex; flex-direction: column; justify-content: center; align-items: flex-start;
}
.left-bar {
  position: absolute; left: 0; top: 0; width: 6pt; height: 405pt;
  background: #FF6B35;
}
.content {
  margin-left: 60pt; margin-right: 60pt;
}
.eyebrow {
  color: #FF6B35; font-size: 11pt; font-weight: bold; letter-spacing: 3pt;
  text-transform: uppercase; margin-bottom: 16pt;
}
.title {
  color: #FFFFFF; font-size: 48pt; font-weight: bold; line-height: 1.1;
  margin-bottom: 18pt;
}
.title-accent {
  color: #FF6B35;
}
.tagline {
  color: #94A3B8; font-size: 14pt; line-height: 1.5; max-width: 480pt;
  margin-bottom: 32pt;
}
.badge-row {
  display: flex; gap: 12pt; align-items: center;
}
.badge {
  background: #1A1F2E; border: 1pt solid #2D3748;
  border-radius: 20pt; padding: 6pt 14pt;
  color: #94A3B8; font-size: 10pt;
}
.badge-highlight {
  background: #FF6B3522; border: 1pt solid #FF6B35;
  border-radius: 20pt; padding: 6pt 14pt;
  color: #FF6B35; font-size: 10pt; font-weight: bold;
}
.corner-graphic {
  position: absolute; right: 0; bottom: 0;
  width: 240pt; height: 240pt;
  background: #1A1F2E;
  border-radius: 240pt 0 0 0;
  display: flex; align-items: flex-end; justify-content: flex-end;
  padding: 20pt;
}
.corner-text {
  color: #2D3748; font-size: 60pt; font-weight: bold;
  text-align: right; line-height: 1;
}
</style>
</head>
<body>
<div class="left-bar"></div>
<div class="content">
  <p class="eyebrow">Tinyfish Hackathon 2026</p>
  <p class="title">Digital<br><span class="title-accent">Mystery</span><br>Shopper</p>
  <p class="tagline">Every brand knows their click-through rate.<br>Nobody knows what it's like to be their customer online.<br><b>We do.</b></p>
  <div class="badge-row">
    <div class="badge-highlight"><p style="margin:0; color:#FF6B35; font-size:10pt; font-weight:bold;">Powered by tinyfish</p></div>
    <div class="badge"><p style="margin:0; color:#94A3B8; font-size:10pt;">100+ AI consumer agents</p></div>
    <div class="badge"><p style="margin:0; color:#94A3B8; font-size:10pt;">Full journey intelligence</p></div>
  </div>
</div>
<div class="corner-graphic">
  <p class="corner-text">🔍</p>
</div>
</body>
</html>
